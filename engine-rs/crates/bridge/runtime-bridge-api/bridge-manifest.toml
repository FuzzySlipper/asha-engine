surface = "stable"
input = "protocol_voxel_conversion::VoxelConversionPreviewRequest"
output = "protocol_voxel_conversion::VoxelConversionPreview"
errors = "RuntimeBridgeError"
summary = "Preview the current Rust-owned voxel-conversion plan, guarded by the expected plan hash and returned as generated DTO evidence."

[[operation]]
name = "apply_voxel_conversion"
