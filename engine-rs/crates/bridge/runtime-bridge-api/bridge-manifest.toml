surface = "stable"
input = "protocol_voxel_conversion::VoxelModelWindowRequest"
output = "protocol_voxel_conversion::VoxelModelWindowReadout"
errors = "RuntimeBridgeError"
summary = "Read a quota-guarded voxel-space sample window from an authority-owned model so agents can inspect cells/cross-sections without dumping full volumes."

[[operation]]
name = "export_voxel_volume_asset"
surface = "stable"
input = "protocol_voxel_asset::VoxelVolumeAssetExportRequest"
output = "protocol_voxel_asset::VoxelVolumeAssetExportReceipt"
errors = "RuntimeBridgeError"
summary = "Export a complete resident runtime voxel model as an Asha-native voxel-volume asset proposal with Rust-owned sparse runs, validation diagnostics, canonical JSON, and authority hashes."

[[operation]]
name = "save_voxel_volume_asset"
surface = "stable"
input = "protocol_voxel_asset::VoxelVolumeAssetSaveRequest"
output = "protocol_voxel_asset::VoxelVolumeAssetSaveReceipt"
errors = "RuntimeBridgeError"
summary = "Validate an explicit runtime-to-stored voxel-volume asset diff/save transaction and return the canonical payload for host persistence."

[[operation]]
name = "update_voxel_volume_asset_palette"
surface = "stable"
input = "protocol_voxel_asset::VoxelVolumeAssetPaletteUpdateRequest"
output = "protocol_voxel_asset::VoxelVolumeAssetPaletteUpdateReceipt"
errors = "RuntimeBridgeError"
summary = "Validate a bounded stored-only voxel material palette replacement and return the canonical ProjectBundle asset diff without mutating runtime state."

[[operation]]
name = "initialize_voxel_volume_authoring"
surface = "stable"
input = "protocol_voxel_asset::VoxelVolumeAuthoringInitializeRequest"
output = "protocol_voxel_asset::VoxelVolumeAuthoringInitializeReceipt"
errors = "RuntimeBridgeError"
summary = "Initialize one empty bounded runtime voxel model and seed chunk for public authoring without requiring a stored asset or mesh conversion."

[[operation]]
name = "load_voxel_volume_asset"
surface = "stable"
input = "protocol_voxel_asset::VoxelVolumeAssetLoadRequest"
output = "protocol_voxel_asset::VoxelVolumeAssetLoadReceipt"
errors = "RuntimeBridgeError"
summary = "Load a validated Asha-native stored voxel-volume asset into runtime authority with explicit stored-to-runtime diagnostics and readback evidence."

[[operation]]
name = "unload_voxel_volume_asset"
surface = "stable"
input = "protocol_voxel_asset::VoxelVolumeAssetUnloadRequest"
output = "protocol_voxel_asset::VoxelVolumeAssetUnloadReceipt"
errors = "RuntimeBridgeError"
summary = "Remove one hash-guarded resident voxel-volume model from runtime authority without deleting its durable ProjectBundle asset or unrelated resident models."

[[operation]]
name = "validate_voxel_annotation_layer"
surface = "stable"
input = "protocol_voxel_annotation::VoxelAnnotationLayerValidationRequest"
output = "protocol_voxel_annotation::VoxelAnnotationLayerValidationReport"
errors = "RuntimeBridgeError"
summary = "Validate and hash an Asha-native stored voxel annotation layer through Rust authority before runtime load."

