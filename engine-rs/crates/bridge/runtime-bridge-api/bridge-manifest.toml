# ASHA runtime bridge manifest (curated)
#
# This is the SINGLE source of truth for the runtime bridge surface. It is small,
# hand-reviewed, and deliberately NOT a generic RPC registry. Adding an operation
# is a boundary change and requires contract-steward review (ADR 0006).
#
# Format spec + generated-glue plan + conformance shape: ./MANIFEST-FORMAT.md
# Validate:        python3 harness/bridge/validate-manifest.py
# Guardrail scan:  bash harness/bridge/check-bridge-guardrails.sh

[manifest]
version = 1
owning_crate = "runtime-bridge-api"
facade_package = "@asha/runtime-bridge"
native_package = "@asha/native-bridge"
wasm_replay_package = "@asha/wasm-replay-bridge"
# Every operation's error channel is this typed enum. No string/JSON error blobs.
error_type = "RuntimeBridgeError"
# Opaque, bridge-owned handle types. Never raw pointers in structured payloads;
# never a StateStore handle.
handle_types = ["EngineHandle", "RuntimeBufferHandle", "FrameCursor", "ReplaySessionHandle", "CameraHandle"]

# ── Stable runtime surface ───────────────────────────────────────────────────
# Bounded verbs only. One operation in, one wrapper out.

[[operation]]
name = "initialize_engine"
surface = "stable"
input = "protocol_runtime::EngineConfig"
output = "EngineHandle"
errors = "RuntimeBridgeError"
summary = "Construct an engine/session. Returns an opaque handle, never a StateStore."

[[operation]]
name = "step_simulation"
surface = "stable"
input = "protocol_runtime::StepInputEnvelope"
output = "protocol_runtime::StepResult"
errors = "RuntimeBridgeError"
summary = "Advance the simulation one tick from a deterministic input envelope."

[[operation]]
name = "submit_commands"
surface = "stable"
input = "protocol_voxel::CommandBatch"
output = "protocol_voxel::CommandResult"
errors = "RuntimeBridgeError"
summary = "Submit a batch of proposed voxel commands (generated VoxelCommand union) for Rust-side validation + apply."

[[operation]]
name = "pick_voxel"
surface = "stable"
input = "protocol_voxel::PickRay"
output = "protocol_voxel::PickResult"
errors = "RuntimeBridgeError"
summary = "Raycast a world-space PickRay against authority voxel state and return the nearest classified VoxelHit (or a classified miss). Rust owns the voxel-grid raycast; the renderer only builds the ray."

[[operation]]
name = "apply_collision_constrained_camera_input"
surface = "stable"
input = "protocol_view::CollisionConstrainedCameraInputEnvelope"
output = "protocol_view::CameraCollisionSnapshot"
errors = "RuntimeBridgeError"
summary = "Apply first-person view input while constraining translation against the authority-derived voxel collision projection; returns before/attempted/after pose plus collision evidence."

[[operation]]
name = "select_voxel"
surface = "stable"
input = "protocol_view::ScreenPointToPickRayRequest"
output = "protocol_view::VoxelSelectionSnapshot"
errors = "RuntimeBridgeError"
summary = "Derive a screen/crosshair pick ray from bridge-owned camera/projection evidence, raycast it against authority voxel state, and return selection/edit-anchor evidence."

[[operation]]
name = "read_voxel_mesh_evidence"
surface = "stable"
input = "protocol_render::VoxelMeshEvidenceRequest"
output = "protocol_render::VoxelMeshEvidenceSnapshot"
errors = "RuntimeBridgeError"
summary = "Read compact deterministic voxel mesh/remesh evidence (world hash, per-chunk content/mesh hashes, stats, material slots) derived from Rust authority and svc-mesh; no renderer internals or inline geometry."

[[operation]]
name = "plan_voxel_conversion"
surface = "stable"
input = "protocol_voxel_conversion::VoxelConversionPlanRequest"
output = "protocol_voxel_conversion::VoxelConversionPlan"
errors = "RuntimeBridgeError"
summary = "Plan a bounded static-mesh to voxel conversion through Rust authority using generated voxel-conversion DTOs; no Studio/VoxelForge/raw renderer transport."

[[operation]]
name = "register_voxel_conversion_source"
surface = "stable"
input = "protocol_voxel_conversion::VoxelConversionSourceRegistrationRequest"
output = "protocol_voxel_conversion::VoxelConversionSourceRegistration"
errors = "RuntimeBridgeError"
summary = "Register inline static-mesh geometry as an authority-visible voxel conversion source; rejected inputs return typed diagnostics and no Studio-side voxelizer is involved."

[[operation]]
name = "register_voxel_conversion_mesh_asset"
surface = "stable"
input = "protocol_voxel_conversion::VoxelConversionMeshAssetRegistrationRequest"
output = "protocol_voxel_conversion::VoxelConversionSourceRegistration"
errors = "RuntimeBridgeError"
summary = "Register a ProjectBundle/catalog static-mesh asset as an authority-visible voxel conversion source; Rust validates mesh geometry, primitive identity, and material slots."

[[operation]]
name = "preview_voxel_conversion"
surface = "stable"
input = "protocol_voxel_conversion::VoxelConversionPreviewRequest"
output = "protocol_voxel_conversion::VoxelConversionPreview"
errors = "RuntimeBridgeError"
summary = "Preview the current Rust-owned voxel-conversion plan, guarded by the expected plan hash and returned as generated DTO evidence."

[[operation]]
name = "apply_voxel_conversion"
surface = "stable"
input = "protocol_voxel_conversion::VoxelConversionApplyRequest"
output = "protocol_voxel_conversion::VoxelConversionReceipt"
errors = "RuntimeBridgeError"
summary = "Apply a guarded voxel-conversion plan/preview through upstream voxel command authority; rejected requests return classified conversion diagnostics."

[[operation]]
name = "export_voxel_conversion_evidence"
surface = "stable"
input = "protocol_voxel_conversion::VoxelConversionEvidenceRef[]"
output = "protocol_voxel_conversion::VoxelConversionEvidenceRef[]"
errors = "RuntimeBridgeError"
summary = "Export selected voxel-conversion evidence refs that are present in the current Rust authority conversion state."

[[operation]]
name = "read_voxel_model_info"
surface = "stable"
input = "protocol_voxel_conversion::VoxelModelInfoRequest"
output = "protocol_voxel_conversion::VoxelModelInfoReadout"
errors = "RuntimeBridgeError"
summary = "Read bounded authority-owned voxel model information for an applied conversion target; missing/unknown models return typed diagnostics."

[[operation]]
name = "read_voxel_model_window"
surface = "stable"
input = "protocol_voxel_conversion::VoxelModelWindowRequest"
output = "protocol_voxel_conversion::VoxelModelWindowReadout"
errors = "RuntimeBridgeError"
summary = "Read a quota-guarded voxel-space sample window from an authority-owned model so agents can inspect cells/cross-sections without dumping full volumes."

[[operation]]
name = "export_voxel_volume_asset"
surface = "stable"
input = "protocol_voxel_asset::VoxelVolumeAssetExportRequest"
output = "protocol_voxel_asset::VoxelVolumeAssetExportReceipt"
errors = "RuntimeBridgeError"
summary = "Export a complete resident runtime voxel model as an Asha-native voxel-volume asset proposal with Rust-owned sparse runs, validation diagnostics, canonical JSON, and authority hashes."

[[operation]]
name = "save_voxel_volume_asset"
surface = "stable"
input = "protocol_voxel_asset::VoxelVolumeAssetSaveRequest"
output = "protocol_voxel_asset::VoxelVolumeAssetSaveReceipt"
errors = "RuntimeBridgeError"
summary = "Validate an explicit runtime-to-stored voxel-volume asset diff/save transaction and return the canonical payload for host persistence."

[[operation]]
name = "load_voxel_volume_asset"
surface = "stable"
input = "protocol_voxel_asset::VoxelVolumeAssetLoadRequest"
output = "protocol_voxel_asset::VoxelVolumeAssetLoadReceipt"
errors = "RuntimeBridgeError"
summary = "Load a validated Asha-native stored voxel-volume asset into runtime authority with explicit stored-to-runtime diagnostics and readback evidence."

[[operation]]
name = "validate_voxel_annotation_layer"
surface = "stable"
input = "protocol_voxel_annotation::VoxelAnnotationLayerValidationRequest"
output = "protocol_voxel_annotation::VoxelAnnotationLayerValidationReport"
errors = "RuntimeBridgeError"
summary = "Validate and hash an Asha-native stored voxel annotation layer through Rust authority before runtime load."

[[operation]]
name = "load_voxel_annotation_layer"
surface = "stable"
input = "protocol_voxel_annotation::VoxelAnnotationLayerLoadRequest"
output = "protocol_voxel_annotation::VoxelAnnotationLayerLoadReceipt"
errors = "RuntimeBridgeError"
summary = "Load a validated stored voxel annotation layer against a resident voxel-volume model with explicit hash/session guards."

[[operation]]
name = "read_voxel_annotation_query"
surface = "stable"
input = "protocol_voxel_annotation::VoxelAnnotationQueryRequest"
output = "protocol_voxel_annotation::VoxelAnnotationQueryReadout"
errors = "RuntimeBridgeError"
summary = "Read quota-guarded cell/bounds/region/summary data from a loaded runtime voxel annotation layer."

[[operation]]
name = "apply_voxel_annotation_edit"
surface = "stable"
input = "protocol_voxel_annotation::VoxelAnnotationEditRequest"
output = "protocol_voxel_annotation::VoxelAnnotationEditReceipt"
errors = "RuntimeBridgeError"
summary = "Apply a typed hash-guarded edit to a loaded runtime voxel annotation layer and return deterministic receipt evidence."

[[operation]]
name = "export_voxel_annotation_layer"
surface = "stable"
input = "protocol_voxel_annotation::VoxelAnnotationLayerExportRequest"
output = "protocol_voxel_annotation::VoxelAnnotationLayerExportReceipt"
errors = "RuntimeBridgeError"
summary = "Export a loaded runtime voxel annotation layer back to the stored annotation DTO shape with authority hashes."

[[operation]]
name = "read_voxel_edit_history"
surface = "stable"
input = "protocol_voxel_edit_history::VoxelEditHistoryReadRequest"
output = "protocol_voxel_edit_history::VoxelEditHistorySummary"
errors = "RuntimeBridgeError"
summary = "Read bounded Rust-owned voxel edit history/cursor state for a loaded history timeline; unavailable history fails closed instead of TS reconstruction."

[[operation]]
name = "preview_voxel_edit_revert"
surface = "stable"
input = "protocol_voxel_edit_history::VoxelEditHistoryRevertRequest"
output = "protocol_voxel_edit_history::VoxelEditHistoryRevertReceipt"
errors = "RuntimeBridgeError"
summary = "Preview a Rust-owned voxel history revert target with bounded replay/diff evidence without mutating authority."

[[operation]]
name = "apply_voxel_edit_revert"
surface = "stable"
input = "protocol_voxel_edit_history::VoxelEditHistoryRevertRequest"
output = "protocol_voxel_edit_history::VoxelEditHistoryRevertReceipt"
errors = "RuntimeBridgeError"
summary = "Apply a Rust-owned voxel history revert request after cursor/history hash guards and return generated receipt evidence."

[[operation]]
name = "undo_voxel_edit"
surface = "stable"
input = "protocol_voxel_edit_history::VoxelEditHistoryUndoRequest"
output = "protocol_voxel_edit_history::VoxelEditHistoryUndoReceipt"
errors = "RuntimeBridgeError"
summary = "Undo one retained voxel edit transaction through Rust-owned history cursor authority."

[[operation]]
name = "redo_voxel_edit"
surface = "stable"
input = "protocol_voxel_edit_history::VoxelEditHistoryRedoRequest"
output = "protocol_voxel_edit_history::VoxelEditHistoryRedoReceipt"
errors = "RuntimeBridgeError"
summary = "Redo one retained voxel edit transaction from the Rust-owned history redo tail."

[[operation]]
name = "load_fps_runtime_session"
surface = "stable"
input = "protocol_runtime::FpsRuntimeSessionLoadRequest"
output = "protocol_runtime::FpsRuntimeSessionSnapshot"
errors = "RuntimeBridgeError"
summary = "Load an FPS/ECRP ProjectBundle-shaped RuntimeSession through Rust rule-lifecycle authority; validates/bootstrap stored EntityDefinitions and PolicyBindings atomically."

[[operation]]
name = "read_fps_runtime_session"
surface = "stable"
input = "Unit"
output = "protocol_runtime::FpsRuntimeSessionSnapshot"
errors = "RuntimeBridgeError"
summary = "Read typed FPS/ECRP RuntimeSession projection from Rust authority, including backend provenance, lifecycle/health/policy binding/read-set/replay evidence."

[[operation]]
name = "apply_fps_primary_fire"
surface = "stable"
input = "protocol_runtime::FpsPrimaryFireRequest"
output = "protocol_runtime::FpsPrimaryFireResult"
errors = "RuntimeBridgeError"
summary = "Submit a primary-fire intent through Rust svc-combat plus rule-lifecycle authority; returns health/lifecycle/render/replay evidence."

[[operation]]
name = "invoke_game_extension_weapon_effect"
surface = "stable"
input = "protocol_runtime::GameExtensionWeaponEffectInvocationRequest"
output = "protocol_runtime::GameExtensionWeaponEffectInvocationResult"
errors = "RuntimeBridgeError"
summary = "Invoke a declared game-owned Rust weapon-effect hook, validate its generated proposal, and apply accepted output through FPS combat authority with replay evidence."

[[operation]]
name = "validate_game_rule_catalog"
surface = "stable"
input = "protocol_game_rules::GameRuleCatalog"
output = "protocol_runtime::GameRuleCatalogValidationReceipt"
errors = "RuntimeBridgeError"
summary = "Validate a generated generic game-rules catalog through Rust svc-game-rules authority; returns typed diagnostics, trace, hash, and evidence."

[[operation]]
name = "submit_game_rule_effect_intent"
surface = "stable"
input = "protocol_runtime::GameRuleEffectIntentRequest"
output = "protocol_game_rules::GameRuleResolutionReceipt"
errors = "RuntimeBridgeError"
summary = "Submit one typed generic effect/impact intent through Rust svc-game-rules; no arbitrary JSON rule dispatch or JS authority callback."

[[operation]]
name = "read_game_rule_runtime_readout"
surface = "stable"
input = "Unit"
output = "protocol_runtime::GameRuleRuntimeReadout"
errors = "RuntimeBridgeError"
summary = "Read bounded recent game-rules modifier, trace, and replay evidence without exposing raw state."

[[operation]]
name = "restart_fps_runtime_session"
surface = "stable"
input = "protocol_runtime::FpsRuntimeSessionRestartRequest"
output = "protocol_runtime::FpsRuntimeSessionSnapshot"
errors = "RuntimeBridgeError"
summary = "Restart the FPS/ECRP RuntimeSession by replaying the validated stored bundle through Rust authority, guarded by the current session epoch."

[[operation]]
name = "read_fps_encounter_director"
surface = "stable"
input = "protocol_runtime::FpsEncounterLifecycleInput"
output = "protocol_runtime::FpsEncounterDirectorSnapshot"
errors = "RuntimeBridgeError"
summary = "Read the Rust-owned FPS/ECRP encounter director projection, including lifecycle, read-set, and replay provenance."

[[operation]]
name = "apply_fps_encounter_transition"
surface = "stable"
input = "protocol_runtime::FpsEncounterTransitionRequest"
output = "protocol_runtime::FpsEncounterTransitionResult"
errors = "RuntimeBridgeError"
summary = "Apply an FPS/ECRP encounter transition through rule-lifecycle authority; accepted transitions update encounter state and replay evidence."

[[operation]]
name = "read_render_diffs"
surface = "stable"
input = "FrameCursor"
output = "protocol_render::RenderFrameDiffDescriptor"
errors = "RuntimeBridgeError"
buffers = "read-only descriptor; large geometry referenced by RuntimeBufferHandle"
summary = "Pull retained-mode render diffs since the cursor. Small metadata inline; large payloads by handle."

[[operation]]
name = "read_model_material_preview"
surface = "stable"
input = "protocol_render::ModelMaterialPreviewRequest"
output = "protocol_render::ModelMaterialPreviewSnapshot"
errors = "RuntimeBridgeError"
summary = "Read/derive a typed model-material preview using public catalog/material/static-mesh DTOs and retained-mode render-diff evidence. Native transports may fail closed until wired; no renderer internals or hardware claims."

[[operation]]
name = "read_scene_object_snapshot"
surface = "stable"
input = "Unit"
output = "protocol_scene::SceneObjectSnapshot"
errors = "RuntimeBridgeError"
summary = "Read the canonical scene-object hierarchy snapshot from Rust authority. Scene objects are authored scene nodes, not render handles or runtime entities."

[[operation]]
name = "apply_scene_object_command"
surface = "stable"
input = "protocol_scene::SceneObjectCommandRequest"
output = "protocol_scene::SceneObjectCommandResult"
errors = "RuntimeBridgeError"
summary = "Apply one typed scene-object hierarchy command with expected-document-hash validation, returning either an accepted outcome or a classified rejection."

# ── Runtime view/camera surface (#2561/#2564) ─────────────────────────────────
# Deterministic bridge-owned view/projection state for editor/testbench evidence.
# This is not gameplay authority, not a renderer object, and not a StateStore handle.

[[operation]]
name = "create_camera"
surface = "stable"
input = "protocol_view::CameraCreateRequest"
output = "protocol_view::CameraSnapshot"
errors = "RuntimeBridgeError"
summary = "Create a bridge-owned runtime view camera and return its deterministic pose/projection snapshot."

[[operation]]
name = "apply_first_person_camera_input"
surface = "stable"
input = "protocol_view::FirstPersonCameraInputEnvelope"
output = "protocol_view::CameraSnapshot"
errors = "RuntimeBridgeError"
summary = "Apply bounded deterministic first-person view input to a CameraHandle and return the post-input snapshot."

[[operation]]
name = "apply_enemy_direct_nav_movement"
surface = "stable"
input = "protocol_runtime::EnemyDirectNavMovementRequest"
output = "protocol_runtime::EnemyDirectNavMovementResult"
errors = "RuntimeBridgeError"
summary = "Apply one enemy direct-navigation movement transaction through Rust svc-pathfinding plus core-entity transform authority; returns movement and transform evidence without TypeScript-owned mutation."

[[operation]]
name = "read_camera_projection"
surface = "stable"
input = "protocol_view::CameraProjectionRequest"
output = "protocol_view::CameraProjectionSnapshot"
errors = "RuntimeBridgeError"
summary = "Read deterministic camera pose/projection evidence, including matrices/hash, without renderer internals."

[[operation]]
name = "get_buffer"
surface = "stable"
input = "RuntimeBufferHandle"
output = "RuntimeBufferView"
errors = "RuntimeBridgeError"
buffers = "borrows bridge-owned bytes; view valid until release_buffer or next frame supersedes it"
summary = "Borrow a typed view over bridge-owned bytes for a buffer handle (no copy through JSON)."

[[operation]]
name = "release_buffer"
surface = "stable"
input = "RuntimeBufferHandle"
output = "Unit"
errors = "RuntimeBridgeError"
buffers = "invalidates any outstanding RuntimeBufferView for the handle"
summary = "Release a borrowed buffer; outstanding views must be copied out first."

# ── ProjectBundle load/save composition surface (#2363 vocabulary migration) ─
# Curated, bounded verbs for loading a ProjectBundle into authority, saving the
# current ProjectBundle/session content, and reading composition status/diagnostics.
# Inputs/outputs are generated protocol types; the runtime never accepts a raw
# path or JSON blob here.

[[operation]]
name = "load_project_bundle"
surface = "stable"
input = "protocol_project_bundle::ProjectBundleManifest"
output = "protocol_diagnostics::DiagnosticReportSet"
errors = "RuntimeBridgeError"
summary = "Load a ProjectBundle into authority via the staged executor. Returns the composition diagnostics (empty == loaded; a fatal report == failed, prior ProjectBundle/session state untouched)."

[[operation]]
name = "save_project_bundle"
surface = "stable"
input = "Unit"
output = "protocol_project_bundle::SaveSummary"
errors = "RuntimeBridgeError"
summary = "Save the current ProjectBundle/session content through the real save/compaction path. Fails closed with NotInitialized if no ProjectBundle is loaded."

[[operation]]
name = "get_project_bundle_composition_status"
surface = "stable"
input = "Unit"
output = "protocol_diagnostics::DiagnosticReportSet"
errors = "RuntimeBridgeError"
summary = "Read the current load/save composition status and diagnostics without mutating authority."

[[operation]]
name = "unload_project_bundle"
surface = "stable"
input = "Unit"
output = "Unit"
errors = "RuntimeBridgeError"
summary = "Unload the staged/live ProjectBundle, returning the runtime to an empty state."

# ── Replay surface (quarantined: tests/devtools/CI only) ─────────────────────
# These are exercised through the wasm-replay-bridge / native replay path, not
# the production renderer path. Quarantined surfaces still get typed I/O.

[[operation]]
name = "load_replay_fixture"
surface = "quarantined"
quarantine_reason = "replay/golden harness; not in the production runtime path"
input = "protocol_replay::ReplayFixture"
output = "ReplaySessionHandle"
errors = "RuntimeBridgeError"
summary = "Load a replay fixture into a deterministic replay session."

[[operation]]
name = "run_replay_step"
surface = "quarantined"
quarantine_reason = "replay/golden harness; not in the production runtime path"
input = "ReplaySessionHandle"
output = "protocol_replay::ReplayStepReport"
errors = "RuntimeBridgeError"
summary = "Advance a replay session one step and report hash/divergence for golden checks."
