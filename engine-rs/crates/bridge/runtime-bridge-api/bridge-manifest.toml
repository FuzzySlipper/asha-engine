input = "protocol_voxel_conversion::VoxelConversionApplyRequest"
output = "protocol_voxel_conversion::VoxelConversionReceipt"
errors = "RuntimeBridgeError"
summary = "Apply a guarded voxel-conversion plan/preview through upstream voxel command authority; rejected requests return classified conversion diagnostics."

