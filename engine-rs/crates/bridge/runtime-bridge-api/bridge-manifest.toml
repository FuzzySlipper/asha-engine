# ASHA runtime bridge manifest (curated)
#
# This is the SINGLE source of truth for the runtime bridge surface. It is small,
# hand-reviewed, and deliberately NOT a generic RPC registry. Adding an operation
# is a boundary change and requires contract-steward review (ADR 0006).
#
# Format spec + generated-glue plan + conformance shape: ./MANIFEST-FORMAT.md
# Validate:        python3 harness/bridge/validate-manifest.py
# Guardrail scan:  bash harness/bridge/check-bridge-guardrails.sh

[manifest]
version = 1
owning_crate = "runtime-bridge-api"
facade_package = "@asha/runtime-bridge"
native_package = "@asha/native-bridge"
wasm_replay_package = "@asha/wasm-replay-bridge"
# Every operation's error channel is this typed enum. No string/JSON error blobs.
error_type = "RuntimeBridgeError"
default_max_input_bytes = 8388608
default_max_output_bytes = 8388608
error_families = [
  "not_initialized", "invalid_input", "unknown_handle", "buffer_expired",
  "native_unavailable", "voxel_conversion_unavailable", "unsupported_source_asset",
  "source_hash_mismatch", "invalid_material_map", "output_limit_exceeded",
  "stale_authority_snapshot", "conversion_replay_mismatch",
  "operation_unimplemented", "internal",
]
# Opaque, bridge-owned handle types. Never raw pointers in structured payloads;
# never a StateStore handle.
handle_types = ["EngineHandle", "RuntimeBufferHandle", "FrameCursor", "ReplaySessionHandle", "CameraHandle"]

# Fixed capability cells for generated TypeScript facade grouping and lifecycle
# readout. Every operation below must appear in exactly one group.

[[capability]]
id = "input"
interface = "RuntimeInputPort"
property = "input"
initialization = "requiresEngine"
runtime_project = "retainedAcrossProjectChanges"
snapshot_hash = "inputEvidence"
resource_lifetime = "session"
operations = ["configure_input_session", "apply_input_context_command", "submit_raw_input", "replay_resolved_input_action", "read_input_context_state"]

[[capability]]
id = "time_simulation"
interface = "RuntimeTimeSimulationPort"
property = "timeSimulation"
initialization = "requiresEngine"
runtime_project = "retainedAcrossProjectChanges"
snapshot_hash = "timeState"
resource_lifetime = "session"
operations = ["apply_time_control_command", "read_time_control_state", "step_simulation"]

[[capability]]
id = "scene_entities"
interface = "RuntimeSceneEntityPort"
property = "sceneEntities"
initialization = "requiresEngine"
runtime_project = "retainedAcrossProjectChanges"
snapshot_hash = "sceneDocument"
resource_lifetime = "session"
operations = ["decode_scene_document", "encode_scene_document", "apply_scene_document_authoring", "read_model_material_preview", "read_scene_object_snapshot", "apply_scene_object_command", "apply_enemy_direct_nav_movement"]

[[capability]]
id = "voxel_assets_buffers"
interface = "RuntimeVoxelAssetBufferPort"
property = "voxelAssetsBuffers"
initialization = "requiresEngine"
runtime_project = "retainedAcrossProjectChanges"
snapshot_hash = "voxelStateAndResources"
resource_lifetime = "mixedExplicitAndSession"
operations = [
  "submit_commands", "pick_voxel", "configure_voxel_projection_instances", "pick_voxel_instance", "select_voxel", "read_voxel_mesh_evidence", "read_voxel_update_telemetry",
  "plan_voxel_conversion", "register_voxel_conversion_source", "register_voxel_conversion_mesh_asset",
  "import_voxel_conversion_mesh_source", "read_voxel_conversion_source_metadata",
  "preview_voxel_conversion", "apply_voxel_conversion", "read_voxel_model_info",
  "read_voxel_model_window", "export_voxel_volume_asset", "save_voxel_volume_asset",
  "update_voxel_volume_asset_palette", "initialize_voxel_volume_authoring",
  "load_voxel_volume_asset", "unload_voxel_volume_asset", "validate_voxel_annotation_layer",
  "load_voxel_annotation_layer", "read_voxel_annotation_query", "apply_voxel_annotation_edit",
  "export_voxel_annotation_layer", "read_voxel_edit_history", "preview_voxel_edit_revert",
  "apply_voxel_edit_revert", "undo_voxel_edit", "redo_voxel_edit", "get_buffer", "release_buffer",
]

[[capability]]
id = "camera"
interface = "RuntimeCameraPort"
property = "camera"
initialization = "requiresEngine"
runtime_project = "retainedAcrossProjectChanges"
snapshot_hash = "cameraProjection"
resource_lifetime = "session"
operations = ["apply_collision_constrained_camera_input", "create_camera", "apply_camera_mode_command", "apply_camera_navigation_input", "read_camera_controller_state", "apply_first_person_camera_input", "read_camera_projection"]

[[capability]]
id = "gameplay"
interface = "RuntimeGameplayPort"
property = "gameplay"
initialization = "requiresEngine"
runtime_project = "retainedAcrossProjectChanges"
snapshot_hash = "gameplaySessionAndReplay"
resource_lifetime = "session"
operations = ["read_fps_runtime_session", "apply_fps_primary_fire", "read_composed_runtime_session", "read_gameplay_module_view", "read_gameplay_prefab_part_interaction_target", "apply_gameplay_prefab_part_interaction", "invoke_game_extension_weapon_effect", "validate_game_rule_catalog", "submit_game_rule_effect_intent", "read_game_rule_runtime_readout", "restart_fps_runtime_session", "read_fps_encounter_director", "apply_fps_encounter_transition"]

[[capability]]
id = "projection"
interface = "RuntimeProjectionPort"
property = "projection"
initialization = "requiresEngine"
runtime_project = "retainedAcrossProjectChanges"
snapshot_hash = "projectionFrame"
resource_lifetime = "frame"
operations = ["read_render_diffs", "read_projection_frame", "read_developer_console"]

[[capability]]
id = "workspace_authoring"
interface = "RuntimeWorkspaceAuthoringPort"
property = "workspaceAuthoring"
initialization = "createsEngine"
runtime_project = "ownsProjectLifecycle"
snapshot_hash = "workspaceAuthoringAuthority"
resource_lifetime = "session"
operations = ["read_workspace_authoring_state", "read_workspace_authoring_projection", "decode_project_content", "encode_project_content", "apply_project_content_authoring", "preview_procedural_environment", "apply_procedural_environment", "confirm_workspace_authoring_stored", "prepare_project_write", "confirm_project_write", "close_workspace_authoring"]

[[capability]]
id = "runtime_project_lifecycle"
interface = "RuntimeProjectLifecyclePort"
property = "runtimeProjectLifecycle"
initialization = "createsEngine"
runtime_project = "ownsProjectLifecycle"
snapshot_hash = "activeProjectContent"
resource_lifetime = "session"
operations = ["initialize_engine", "begin_runtime_project_source_resources", "stage_runtime_project_source_resource", "admit_runtime_project_source_batch", "load_runtime_project", "read_active_runtime_project_content", "close_runtime_project", "save_runtime_project_gameplay_checkpoint", "restore_runtime_project_gameplay_checkpoint"]

[[capability]]
id = "replay_evidence"
interface = "RuntimeReplayEvidencePort"
property = "replayEvidence"
initialization = "requiresEngine"
runtime_project = "retainedAcrossProjectChanges"
snapshot_hash = "replayEvidence"
resource_lifetime = "session"
operations = ["export_voxel_conversion_evidence", "load_replay_fixture", "run_replay_step"]

# ── Stable runtime surface ───────────────────────────────────────────────────
# Bounded verbs only. One operation in, one wrapper out.

[[operation]]
name = "initialize_engine"
surface = "stable"
input = "protocol_runtime::EngineConfig"
output = "EngineHandle"
errors = "RuntimeBridgeError"
summary = "Construct an engine/session. Returns an opaque handle, never a StateStore."
facade_input = "bridge::EngineConfig"

[[operation]]
name = "read_workspace_authoring_state"
surface = "stable"
input = "Unit"
output = "protocol_project_bundle::WorkspaceAuthoringStateSummary"
errors = "RuntimeBridgeError"
summary = "Read the complete Rust-owned workspace identity, generation, revisions, dirty status, and lifecycle hashes."
facade_output = "contracts::WorkspaceAuthoringStateSummary"

[[operation]]
name = "read_workspace_authoring_projection"
surface = "stable"
input = "protocol_project_bundle::WorkspaceAuthoringProjectionRequest"
output = "protocol_project_bundle::WorkspaceAuthoringProjectionReceipt"
errors = "RuntimeBridgeError"
summary = "Read one Rust-authorized workspace projection receipt bound to workspace, generation, working revision, and cursor."
facade_input = "contracts::WorkspaceAuthoringProjectionRequest"
facade_output = "bridge::WorkspaceAuthoringProjectionSummary"

[[operation]]
name = "confirm_workspace_authoring_stored"
surface = "stable"
input = "protocol_project_bundle::WorkspaceAuthoringStoredConfirmationRequest"
output = "protocol_project_bundle::WorkspaceAuthoringStoredConfirmationReceipt"
errors = "RuntimeBridgeError"
summary = "Confirm a staged host write only when it matches the current Rust save candidate and workspace generation."
facade_input = "contracts::WorkspaceAuthoringStoredConfirmationRequest"
facade_output = "contracts::WorkspaceAuthoringStoredConfirmationReceipt"

[[operation]]
name = "prepare_project_write"
surface = "stable"
input = "protocol_project_bundle::ProjectWritePrepareRequest"
output = "protocol_project_bundle::ProjectWritePrepareReceipt"
errors = "RuntimeBridgeError"
summary = "Derive and compare-and-swap authorize one complete ProjectBundle write candidate from the Engine-owned workspace scene and ProjectContent set."
facade_input = "contracts::ProjectWritePrepareRequest"
facade_output = "contracts::ProjectWritePrepareReceipt"

[[operation]]
name = "confirm_project_write"
surface = "stable"
input = "protocol_project_bundle::ProjectWriteConfirmRequest"
output = "protocol_project_bundle::ProjectWriteConfirmReceipt"
errors = "RuntimeBridgeError"
summary = "Consume the exact revision-bound Rust project write candidate after atomic trusted-host publication."
facade_input = "contracts::ProjectWriteConfirmRequest"
facade_output = "contracts::ProjectWriteConfirmReceipt"

[[operation]]
name = "close_workspace_authoring"
surface = "stable"
input = "protocol_project_bundle::WorkspaceAuthoringCloseRequest"
output = "protocol_project_bundle::WorkspaceAuthoringCloseReceipt"
errors = "RuntimeBridgeError"
summary = "Close one bound workspace-authoring generation, rejecting unsaved work unless discard is explicit."
facade_input = "contracts::WorkspaceAuthoringCloseRequest"
facade_output = "contracts::WorkspaceAuthoringCloseReceipt"

[[operation]]
name = "decode_project_content"
surface = "stable"
input = "protocol_project_content::ProjectContentDecodeRequest"
output = "protocol_project_content::ProjectContentCodecResult"
errors = "RuntimeBridgeError"
summary = "Strictly decode, cross-validate, and canonicalize a closed set of durable non-scene project content through Rust workspace authority."
facade_input = "contracts::ProjectContentDecodeRequest"
facade_output = "contracts::ProjectContentCodecResult"

[[operation]]
name = "encode_project_content"
surface = "stable"
input = "protocol_project_content::ProjectContentEncodeRequest"
output = "protocol_project_content::ProjectContentCodecResult"
errors = "RuntimeBridgeError"
summary = "Validate and canonically encode typed project-content documents and their actual scene reference context through Rust workspace authority."
facade_input = "contracts::ProjectContentEncodeRequest"
facade_output = "contracts::ProjectContentCodecResult"

[[operation]]
name = "apply_project_content_authoring"
surface = "stable"
input = "protocol_project_content::ProjectContentAuthoringRequest"
output = "protocol_project_content::ProjectContentAuthoringResult"
errors = "RuntimeBridgeError"
summary = "Apply one closed typed compare-and-swap project-content edit and return canonical trusted-host file candidates only after Rust acceptance."
facade_input = "contracts::ProjectContentAuthoringRequest"
facade_output = "contracts::ProjectContentAuthoringResult"

[[operation]]
name = "preview_procedural_environment"
surface = "stable"
input = "protocol_project_content::ProceduralEnvironmentPreviewRequest"
output = "protocol_project_content::ProceduralEnvironmentPreviewResult"
errors = "RuntimeBridgeError"
summary = "Materialize one closed-registry procedural recipe as a revision-bound canonical scene and voxel candidate without RuntimeSession mutation."
facade_input = "contracts::ProceduralEnvironmentPreviewRequest"
facade_output = "contracts::ProceduralEnvironmentPreviewResult"

[[operation]]
name = "apply_procedural_environment"
surface = "stable"
input = "protocol_project_content::ProceduralEnvironmentApplyRequest"
output = "protocol_project_content::ProceduralEnvironmentApplyResult"
errors = "RuntimeBridgeError"
summary = "Consume the current Engine-owned procedural candidate and expose one combined revision-bound host save proposal."
facade_input = "contracts::ProceduralEnvironmentApplyRequest"
facade_output = "contracts::ProceduralEnvironmentApplyResult"

[[operation]]
name = "step_simulation"
surface = "stable"
input = "protocol_runtime::StepInputEnvelope"
output = "protocol_runtime::StepResult"
errors = "RuntimeBridgeError"
summary = "Advance the simulation one tick from a deterministic input envelope."
facade_input = "bridge::StepInputEnvelope"

[[operation]]
name = "apply_time_control_command"
surface = "stable"
input = "protocol_time_control::TimeControlCommand"
output = "protocol_time_control::TimeControlReceipt"
errors = "RuntimeBridgeError"
summary = "Apply a validated Session pause, resume, wall-clock cadence multiplier, or exact paused-step transaction."

[[operation]]
name = "read_time_control_state"
surface = "stable"
input = "Unit"
output = "protocol_time_control::TimeControlState"
errors = "RuntimeBridgeError"
summary = "Read the hash-bound Session time-control mode, cadence multiplier, revision, and authority tick without advancing simulation."

[[operation]]
name = "submit_commands"
surface = "stable"
input = "protocol_voxel::CommandBatch"
output = "protocol_voxel::CommandResult"
errors = "RuntimeBridgeError"
summary = "Submit a batch of proposed voxel commands (generated VoxelCommand union) for Rust-side validation + apply."
max_input_bytes = 2097152

[[operation]]
name = "pick_voxel"
surface = "stable"
input = "protocol_voxel::PickRay"
output = "protocol_voxel::PickResult"
errors = "RuntimeBridgeError"
summary = "Raycast a world-space PickRay against authority voxel state and return the nearest classified VoxelHit (or a classified miss). Rust owns the voxel-grid raycast; the renderer only builds the ray."

[[operation]]
name = "configure_voxel_projection_instances"
surface = "stable"
input = "protocol_voxel::VoxelProjectionBindingRequest"
output = "protocol_voxel::VoxelProjectionBindingReceipt"
errors = "RuntimeBridgeError"
summary = "Atomically bind asset-local voxel projection beneath retained scene-instance roots using workspace generation, revision, registry digest, asset identity, and validated renderer-neutral transforms."

[[operation]]
name = "pick_voxel_instance"
surface = "stable"
input = "protocol_voxel::VoxelInstancePickRequest"
output = "protocol_voxel::VoxelInstancePickResult"
errors = "RuntimeBridgeError"
summary = "Inverse-transform a world ray through an accepted voxel instance binding, independently revalidate the renderer hint against Rust collision authority, and return an asset-local revision-bound edit anchor."

[[operation]]
name = "apply_collision_constrained_camera_input"
surface = "stable"
input = "protocol_view::CollisionConstrainedCameraInputEnvelope"
output = "protocol_view::CameraCollisionSnapshot"
errors = "RuntimeBridgeError"
summary = "Apply first-person view input while constraining translation against the authority-derived voxel collision projection; returns before/attempted/after pose plus collision evidence."

[[operation]]
name = "select_voxel"
surface = "stable"
input = "protocol_view::ScreenPointToPickRayRequest"
output = "protocol_view::VoxelSelectionSnapshot"
errors = "RuntimeBridgeError"
summary = "Derive a screen/crosshair pick ray from bridge-owned camera/projection evidence, raycast it against authority voxel state, and return selection/edit-anchor evidence."

[[operation]]
name = "read_voxel_mesh_evidence"
surface = "stable"
input = "protocol_render::VoxelMeshEvidenceRequest"
output = "protocol_render::VoxelMeshEvidenceSnapshot"
errors = "RuntimeBridgeError"
summary = "Read compact deterministic voxel mesh/remesh evidence (world hash, per-chunk content/mesh hashes, stats, material slots) derived from Rust authority and svc-mesh; no renderer internals or inline geometry."
facade_input = "bridge::VoxelMeshEvidenceRequest"
facade_output = "bridge::VoxelMeshEvidenceSnapshot"

[[operation]]
name = "read_voxel_update_telemetry"
surface = "stable"
input = "protocol_telemetry::VoxelUpdateTelemetryRequest"
output = "protocol_telemetry::VoxelUpdateTelemetryReadout"
errors = "RuntimeBridgeError"
summary = "Read the latest bounded deterministic voxel command/projection/remesh work counters for an exact projection cursor; no storage internals, mutable handles, elapsed timing, authority hash, or replay identity."

[[operation]]
name = "plan_voxel_conversion"
surface = "stable"
input = "protocol_voxel_conversion::VoxelConversionPlanRequest"
output = "protocol_voxel_conversion::VoxelConversionPlan"
errors = "RuntimeBridgeError"
summary = "Plan a bounded static-mesh to voxel conversion through Rust authority using generated voxel-conversion DTOs; no Studio/VoxelForge/raw renderer transport."

[[operation]]
name = "register_voxel_conversion_source"
surface = "stable"
input = "protocol_voxel_conversion::VoxelConversionSourceRegistrationRequest"
output = "protocol_voxel_conversion::VoxelConversionSourceRegistration"
errors = "RuntimeBridgeError"
summary = "Register inline static-mesh geometry as an authority-visible voxel conversion source; rejected inputs return typed diagnostics and no Studio-side voxelizer is involved."

[[operation]]
name = "register_voxel_conversion_mesh_asset"
surface = "stable"
input = "protocol_voxel_conversion::VoxelConversionMeshAssetRegistrationRequest"
output = "protocol_voxel_conversion::VoxelConversionSourceRegistration"
errors = "RuntimeBridgeError"
summary = "Register a ProjectBundle/catalog static-mesh asset as an authority-visible voxel conversion source; Rust validates mesh geometry, primitive identity, and material slots."

[[operation]]
name = "import_voxel_conversion_mesh_source"
surface = "stable"
input = "protocol_voxel_conversion::VoxelConversionMeshSourceImportRequest"
output = "protocol_voxel_conversion::VoxelConversionMeshSourceImportReceipt"
errors = "RuntimeBridgeError"
summary = "Parse host-provided static mesh bytes through Rust authority, register canonical conversion geometry, and return bounded provenance, primitive, material, and bounds evidence."
max_input_bytes = 268468224

[[operation]]
name = "read_voxel_conversion_source_metadata"
surface = "stable"
input = "protocol_voxel_conversion::VoxelConversionSourceMetadataRequest"
output = "protocol_voxel_conversion::VoxelConversionSourceMetadataReadout"
