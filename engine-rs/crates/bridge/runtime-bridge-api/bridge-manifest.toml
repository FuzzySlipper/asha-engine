# ASHA runtime bridge manifest (curated)
#
# This is the SINGLE source of truth for the runtime bridge surface. It is small,
# hand-reviewed, and deliberately NOT a generic RPC registry. Adding an operation
# is a boundary change and requires contract-steward review (ADR 0006).
#
# Format spec + generated-glue plan + conformance shape: ./MANIFEST-FORMAT.md
# Validate:        python3 harness/bridge/validate-manifest.py
# Guardrail scan:  bash harness/bridge/check-bridge-guardrails.sh

[manifest]
version = 1
owning_crate = "runtime-bridge-api"
facade_package = "@asha/runtime-bridge"
native_package = "@asha/native-bridge"
wasm_replay_package = "@asha/wasm-replay-bridge"
# Every operation's error channel is this typed enum. No string/JSON error blobs.
error_type = "RuntimeBridgeError"
# Opaque, bridge-owned handle types. Never raw pointers in structured payloads;
# never a StateStore handle.
handle_types = ["EngineHandle", "RuntimeBufferHandle", "FrameCursor", "ReplaySessionHandle", "CameraHandle"]

# ── Stable runtime surface ───────────────────────────────────────────────────
# Bounded verbs only. One operation in, one wrapper out.

[[operation]]
name = "initialize_engine"
surface = "stable"
input = "protocol_runtime::EngineConfig"
output = "EngineHandle"
errors = "RuntimeBridgeError"
summary = "Construct an engine/session. Returns an opaque handle, never a StateStore."

[[operation]]
name = "step_simulation"
surface = "stable"
input = "protocol_runtime::StepInputEnvelope"
output = "protocol_runtime::StepResult"
errors = "RuntimeBridgeError"
summary = "Advance the simulation one tick from a deterministic input envelope."

[[operation]]
name = "submit_commands"
surface = "stable"
input = "protocol_voxel::CommandBatch"
output = "protocol_voxel::CommandResult"
errors = "RuntimeBridgeError"
summary = "Submit a batch of proposed voxel commands (generated VoxelCommand union) for Rust-side validation + apply."

[[operation]]
name = "pick_voxel"
surface = "stable"
input = "protocol_voxel::PickRay"
output = "protocol_voxel::PickResult"
errors = "RuntimeBridgeError"
summary = "Raycast a world-space PickRay against authority voxel state and return the nearest classified VoxelHit (or a classified miss). Rust owns the voxel-grid raycast; the renderer only builds the ray."

[[operation]]
name = "apply_collision_constrained_camera_input"
surface = "stable"
input = "protocol_view::CollisionConstrainedCameraInputEnvelope"
output = "protocol_view::CameraCollisionSnapshot"
errors = "RuntimeBridgeError"
summary = "Apply first-person view input while constraining translation against the authority-derived voxel collision projection; returns before/attempted/after pose plus collision evidence."

[[operation]]
name = "select_voxel"
surface = "stable"
input = "protocol_view::ScreenPointToPickRayRequest"
output = "protocol_view::VoxelSelectionSnapshot"
errors = "RuntimeBridgeError"
summary = "Derive a screen/crosshair pick ray from bridge-owned camera/projection evidence, raycast it against authority voxel state, and return selection/edit-anchor evidence."

[[operation]]
name = "read_voxel_mesh_evidence"
surface = "stable"
input = "protocol_render::VoxelMeshEvidenceRequest"
output = "protocol_render::VoxelMeshEvidenceSnapshot"
errors = "RuntimeBridgeError"
summary = "Read compact deterministic voxel mesh/remesh evidence (world hash, per-chunk content/mesh hashes, stats, material slots) derived from Rust authority and svc-mesh; no renderer internals or inline geometry."

[[operation]]
name = "read_render_diffs"
surface = "stable"
input = "FrameCursor"
output = "protocol_render::RenderFrameDiffDescriptor"
errors = "RuntimeBridgeError"
buffers = "read-only descriptor; large geometry referenced by RuntimeBufferHandle"
summary = "Pull retained-mode render diffs since the cursor. Small metadata inline; large payloads by handle."

[[operation]]
name = "read_model_material_preview"
surface = "stable"
input = "protocol_render::ModelMaterialPreviewRequest"
output = "protocol_render::ModelMaterialPreviewSnapshot"
errors = "RuntimeBridgeError"
summary = "Read/derive a typed model-material preview using public catalog/material/static-mesh DTOs and retained-mode render-diff evidence. Native transports may fail closed until wired; no renderer internals or hardware claims."

[[operation]]
name = "read_scene_object_snapshot"
surface = "stable"
input = "Unit"
output = "protocol_scene::SceneObjectSnapshot"
errors = "RuntimeBridgeError"
summary = "Read the canonical scene-object hierarchy snapshot from Rust authority. Scene objects are authored scene nodes, not render handles or runtime entities."

[[operation]]
name = "apply_scene_object_command"
surface = "stable"
input = "protocol_scene::SceneObjectCommandRequest"
output = "protocol_scene::SceneObjectCommandResult"
errors = "RuntimeBridgeError"
summary = "Apply one typed scene-object hierarchy command with expected-document-hash validation, returning either an accepted outcome or a classified rejection."

# ── Runtime view/camera surface (#2561/#2564) ─────────────────────────────────
# Deterministic bridge-owned view/projection state for editor/testbench evidence.
# This is not gameplay authority, not a renderer object, and not a StateStore handle.

[[operation]]
name = "create_camera"
surface = "stable"
input = "protocol_view::CameraCreateRequest"
output = "protocol_view::CameraSnapshot"
errors = "RuntimeBridgeError"
summary = "Create a bridge-owned runtime view camera and return its deterministic pose/projection snapshot."

[[operation]]
name = "apply_first_person_camera_input"
surface = "stable"
input = "protocol_view::FirstPersonCameraInputEnvelope"
output = "protocol_view::CameraSnapshot"
errors = "RuntimeBridgeError"
summary = "Apply bounded deterministic first-person view input to a CameraHandle and return the post-input snapshot."

[[operation]]
name = "read_camera_projection"
surface = "stable"
input = "protocol_view::CameraProjectionRequest"
output = "protocol_view::CameraProjectionSnapshot"
errors = "RuntimeBridgeError"
summary = "Read deterministic camera pose/projection evidence, including matrices/hash, without renderer internals."

[[operation]]
name = "get_buffer"
surface = "stable"
input = "RuntimeBufferHandle"
output = "RuntimeBufferView"
errors = "RuntimeBridgeError"
buffers = "borrows bridge-owned bytes; view valid until release_buffer or next frame supersedes it"
summary = "Borrow a typed view over bridge-owned bytes for a buffer handle (no copy through JSON)."

[[operation]]
name = "release_buffer"
surface = "stable"
input = "RuntimeBufferHandle"
output = "Unit"
errors = "RuntimeBridgeError"
buffers = "invalidates any outstanding RuntimeBufferView for the handle"
summary = "Release a borrowed buffer; outstanding views must be copied out first."

# ── World load/save composition surface (world-runtime-composition, #2363) ───
# Curated, bounded verbs for loading a world bundle into authority, saving the
# current world, and reading composition status/diagnostics. Operational (native)
# path — NOT a replacement for replay verification (the quarantined replay surface
# below remains the authority check). Inputs/outputs are generated protocol types;
# the runtime never accepts a raw path or JSON blob here.

[[operation]]
name = "load_world_bundle"
surface = "stable"
input = "protocol_world_bundle::WorldBundleManifest"
output = "protocol_diagnostics::DiagnosticReportSet"
errors = "RuntimeBridgeError"
summary = "Load a world bundle into authority via the staged executor. Returns the composition diagnostics (empty == loaded; a fatal report == failed, prior world untouched)."

[[operation]]
name = "save_current_world"
surface = "stable"
input = "Unit"
output = "protocol_world_bundle::SaveSummary"
errors = "RuntimeBridgeError"
summary = "Save the current authority world through the real save/compaction path. Fails closed with NotInitialized if no world is loaded."

[[operation]]
name = "get_composition_status"
surface = "stable"
input = "Unit"
output = "protocol_diagnostics::DiagnosticReportSet"
errors = "RuntimeBridgeError"
summary = "Read the current load/save composition status and diagnostics without mutating authority."

[[operation]]
name = "unload_world"
surface = "stable"
input = "Unit"
output = "Unit"
errors = "RuntimeBridgeError"
summary = "Unload the staged/live world, returning the runtime to an empty state."

# ── Replay surface (quarantined: tests/devtools/CI only) ─────────────────────
# These are exercised through the wasm-replay-bridge / native replay path, not
# the production renderer path. Quarantined surfaces still get typed I/O.

[[operation]]
name = "load_replay_fixture"
surface = "quarantined"
quarantine_reason = "replay/golden harness; not in the production runtime path"
input = "protocol_replay::ReplayFixture"
output = "ReplaySessionHandle"
errors = "RuntimeBridgeError"
summary = "Load a replay fixture into a deterministic replay session."

[[operation]]
name = "run_replay_step"
surface = "quarantined"
quarantine_reason = "replay/golden harness; not in the production runtime path"
input = "ReplaySessionHandle"
output = "protocol_replay::ReplayStepReport"
errors = "RuntimeBridgeError"
summary = "Advance a replay session one step and report hash/divergence for golden checks."
