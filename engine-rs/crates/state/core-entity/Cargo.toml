[package]
name    = "core-entity"
version.workspace = true
edition.workspace = true

[lints]
workspace = true

# Generic runtime entity substrate (entity-model-design, #2387). State layer.
# Owns the entity core (identity + lifecycle + source), optional capability
# tables, lifecycle commands/events, and save/replay hashing. Depends only on
# foundation value/id crates — never on render, scene, wasm, or any TS-facing
# crate (core-scene depends on THIS, not the reverse; see design §7).
[dependencies]
core-ids    = { path = "../../foundation/core-ids" }
core-math   = { path = "../../foundation/core-math" }
core-assets = { path = "../../foundation/core-assets" }
core-error  = { path = "../../foundation/core-error" }
