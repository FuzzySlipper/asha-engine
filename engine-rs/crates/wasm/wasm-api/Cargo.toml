[package]
name    = "wasm-api"
version.workspace = true
edition.workspace = true

[lints]
workspace = true

# cdylib for the wasm32 build; rlib so the native workspace can still build/test it.
[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# The replay authority (decode + diff + DivergenceClass). Compiling this to wasm32
# is what makes WASM the canonical replay-verification target (ADR 0006 / determinism.md).
sim-replay = { path = "../../sim/sim-replay" }
wasm-bindgen = "=0.2.123"
