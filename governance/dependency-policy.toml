# Dependency layer ordering and cross-layer rules.
# The dep-graph verifier reads this alongside ownership.toml.

[rust.layer_order]
# Lower index = lower in the stack = may not depend on higher layers.
layers = [
    "foundation",
    "state",
    "protocol",
    "sim",
    "services",
    "rules",
    "render",
    "wasm",
    "bridge",
    "tools",
]

[rust.forbidden_cross_layer]
# Entries: [from, to] — 'from' crates must never depend on 'to' layer.
pairs = [
    ["foundation", "state"],
    ["foundation", "protocol"],
    ["foundation", "sim"],
    ["foundation", "services"],
    ["foundation", "rules"],
    ["foundation", "render"],
    ["foundation", "wasm"],
    ["foundation", "tools"],
    ["state",      "protocol"],
    ["state",      "render"],
    ["state",      "wasm"],
    ["state",      "tools"],
    ["protocol",   "sim"],
    ["protocol",   "services"],
    ["protocol",   "rules"],
    ["protocol",   "render"],
    ["protocol",   "wasm"],
    ["services",   "render"],
    ["services",   "wasm"],
    ["rules",      "wasm"],
    ["render",     "wasm"],
    # Authority/transport crates must not depend on the bridge layer.
    ["foundation", "bridge"],
    ["state",      "bridge"],
    ["protocol",   "bridge"],
    ["sim",        "bridge"],
    ["services",   "bridge"],
    ["rules",      "bridge"],
    ["render",     "bridge"],
    ["wasm",       "bridge"],
]

[ts.lane_order]
# TypeScript lane ordering for import direction enforcement.
layers = [
    "contracts",
    "script-sdk",
    "policy",
    "catalog",
    "script-host",
    "native-bridge",
    "runtime-bridge",
    "wasm-replay-bridge",
    "shell",
    "tools",
]

[ts.forbidden_imports]
# Policy/catalog may never import shell or transport packages.
"policy"   = ["@asha/renderer-three", "@asha/ui-dom", "@asha/runtime-bridge", "@asha/native-bridge", "@asha/wasm-replay-bridge", "@asha/electron-main"]
"catalog"  = ["@asha/renderer-three", "@asha/ui-dom", "@asha/runtime-bridge", "@asha/native-bridge", "@asha/wasm-replay-bridge", "@asha/electron-main"]
# Renderer must not import policy.
"renderer-three" = ["@asha/policy-core", "@asha/policy-examples", "@asha/script-host"]
# Only the runtime-bridge facade may import the raw native addon.
# Only tests/devtools may import the WASM replay path.
"native-bridge-import-allowed" = ["@asha/runtime-bridge"]
"wasm-replay-bridge-import-allowed" = ["@asha/devtools"]
