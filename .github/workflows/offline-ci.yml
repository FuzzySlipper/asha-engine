name: ASHA CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: asha-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-asha:
    name: Verify ASHA
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine-rs

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            ts/pnpm-lock.yaml

      - name: Run ASHA checks
        env:
          ASHA_SOURCE_SHAPE_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: ./harness/ci/check-all.sh

      - name: Build and verify the native browser host
        run: ./harness/ci/check-native.sh
